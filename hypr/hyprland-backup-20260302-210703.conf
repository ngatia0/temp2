source = ~/.config/hypr/wallust/wallust-hyprland.conf
# You can split this configuration into multiple files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


$terminal = foot
$fileManager = thunar
$browser = google-chrome-beta

################
### MONITORS ###
################

#availableModes: 2560x1440@60.05Hz 2560x1440@48.04Hz
monitor = eDP-1, 2560x1440@60.05, 0x0, 1.60
#monitor = , highres, auto, 2
# =========================
# Workspaces
# =========================

workspace = 1, monitor:eDP-1, persistent:true
workspace = 2, monitor:eDP-1, persistent:true
workspace = 3, monitor:eDP-1, persistent:true
workspace = 4, monitor:eDP-1, persistent:true


#################
### AUTOSTART ###
#################
#exec-once = hyprsunset
exec-once = systemctl --user start hyprpolkitagent &
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP &
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP &
exec-once = wl-paste --watch clipvault store  --min-entry-length 0 --max-entries 20000 --max-entry-age 5d &
exec-once = swaync &
exec-once = waybar &
exec-once = hypridle &
exec-once = blueman-applet &

exec-once = /home/$USER/.config/hypr/scripts/hypr-reload.sh &
exec-once = waypaper --restore &
exec-once = while true; do sleep 600; waypaper --random; done &
exec-once = /home/$USER/.config/hypr/scripts/playerctl-noti.sh&
exec-once = /home/$USER/.config/hypr/scripts/hyprlock-playerctl.sh &

exec-once = systemctl --user restart  xdg-desktop-portal &
exec-once = systemctl --user restart xdg-desktop-portal-hyprland &
# exec-shutdown =
# exec-once =
# exec-once =
# exec-once =
# exec-once =
# exec-once =


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER
$userMod = CTRL
$singleKeyEnablerMod =

bind = $mainMod, L, exec, hyprlock
bind = $mainMod, period, exec, wofi-emoji --style ~/.config/wofi/emoji.css
bind = $mainMod, K, exec, kate
bind = $mainMod, F, exec, hyprctl dispatch fullscreen
bind = $mainMod, R, exec, ~/.config/hypr/scripts/force-reload.sh
bindr = $mainMod, SPACE, exec, sh -c "rofi -show drun -show-icons -matching fuzzy -theme /home/kevo/.config/rofi/quickapps.rasi; pkill rofi"

bindr = $mainMod SHIFT, 6, exec, sh -c "$terminal -e sudo nano /etc/wireguard/wg0.conf; exit 1"
bindr = $mainMod SHIFT, 7, exec, sh -c "$terminal -e sudo nano /etc/wireguard/wg1.conf; exit 1"
bindr = $mainMod SHIFT, 8, exec, sh -c "$terminal -e sudo nano /etc/wireguard/wg2.conf; exit 1"

bind = $mainMod, 6, exec, sh -c 'IFACE=wg0 ~/.config/hypr/scripts/wireguard.sh'
bind = $mainMod, 7, exec, sh -c 'IFACE=wg1 ~/.config/hypr/scripts/wireguard.sh'
bind = $mainMod, 8, exec, sh -c 'IFACE=wg2 ~/.config/hypr/scripts/wireguard.sh'

#MAIN
bind = $mainMod, G,  togglegroup
bind = $mainMod, S,  togglesplit
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle


###########################################################################

#bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
#edit "sudo nano /etc/systemd/logind.conf"
#HandlePowerKey=ignore

# HandleLidSwitch=ignore
# HandleLidSwitchExternalPower=ignore
# HandleLidSwitchDocked=ignore


# Laptop multimedia keys for volume and LCD brightness
bindr = , XF86PowerOff, exec, sh -c "pgrep -x wlogout >/dev/null && pkill wlogout || wlogout"
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = $mainMod, XF86MonBrightnessUp, exec,systemctl --user enable --now hyprsunset.service
bindel = $mainMod, XF86MonBrightnessDown, exec,systemctl --user disable --now hyprsunset.service
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 1%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 1%-

# Move/resize windows
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Lid
bindl = , switch:on:Lid Switch, exec, hyprlock
bindl = , switch:on:Lid Switch, exec, hyprctl dispatch dpms off eDP-1
bindl = , switch:off:Lid Switch, exec, hyprctl dispatch dpms on eDP-1

###########################################################################

# Example special workspace (scratchpad)
bind = $mainMod, I, togglespecialworkspace, magic
# bind = $mainMod, P, togglespecialworkspace, magic
# Scroll through existing workspaces with mainMod + scroll



bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
#bind = $mainMod, 5, workspace, 5
# bind = $mainMod, 6, workspace, 6
# bind = $mainMod, 7, workspace, 7
# bind = $mainMod, 8, workspace, 8
# bind = $mainMod, 9, workspace, 9
# bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
#bind = $mainMod SHIFT, 5, movetoworkspace, 5
# bind = $mainMod SHIFT, 6, movetoworkspace, 6
# bind = $mainMod SHIFT, 7, movetoworkspace, 7
# bind = $mainMod SHIFT, 8, movetoworkspace, 8
# bind = $mainMod SHIFT, 9, movetoworkspace, 9
# bind = $mainMod SHIFT, 0, movetoworkspace, 10

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = GDK_SCALE,2
env = GTK_THEME,Nord
env = GDK_BACKEND,wayland,x11,*
env = CLUTTER_BACKEND,wayland
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = XCURSOR_SIZE,20
env = HYPRCURSOR_THEME,MyCursor
env = HYPRCURSOR_SIZE,20

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,hyprqt6engine
env = QT_STYLE_OVERRIDE,hyprqt6engine
#env = QT_QPA_PLATFORM,wayland;xcb
env = AQ_DRM_DEVICES=,/dev/dri/card1:/dev/dri/card0
ecosystem:enforce_permissions = false

xwayland {
  force_zero_scaling = true
}


permission = /usr/bin/hyprlock, screencopy, allow
permission = /usr/bin/hypridle, screencopy, allow
#pacman -S uwsm libnewt
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow



# toolkit-specific scale

#####################
### LOOK AND FEEL ###
#####################



general {
    gaps_in = 2
    gaps_out = 0
    border_size = 1


    col.active_border = $color0 $color3 $color5 $color8 $color10 $color13 $color15 45deg
   col.inactive_border = $background

    resize_on_border = true
    allow_tearing = true

    layout = master
}

dwindle {
    force_split = 2            # always right/bottom
    preserve_split = true      # never flip splits
    smart_split = false        # disable cursor logic
    use_active_for_splits = true

    default_split_ratio = 1.0  # 50/50
    split_bias = 1             # focused window keeps size
    split_width_multiplier = 1.2

    smart_resizing = false     # no cursor resizing
    precise_mouse_move = false
}

master {
    orientation = left        # master always on the left
    mfact = 0.52              # master width
    new_status = slave        # new windows go to stack
    new_on_top = false        # append, not prepend
    new_on_active = none      # ignore focused window
    allow_small_split = false

    smart_resizing = false    # no cursor-based resize
    drop_at_cursor = false    # no cursor placement
    always_keep_position = false
}


animations {
    enabled = yes, please :)

    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}



decoration {
    rounding = 3
    rounding_power = 5
    active_opacity = 1.0
    inactive_opacity = 1.0

     blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
        new_optimizations = true
        xray = true
        ignore_opacity = true
    }

    shadow {
        enabled = false
        ignore_window = true
        offset = 1 2
        range = 10
        render_power = 4
        #color = radial($color2, $color4, 60%)
        color = rgba(1a1a1aee)
    }
}

layerrule = blur on, match:namespace waybar
#layerrule = blur on, match:namespace swaync-notification-window
layerrule = dim_around off, match:namespace waybar
layerrule = above_lock 1, match:namespace swaync-notification-window
#layerrule = xray 1, match:namespace swaync-notification-window

##############################
   ### WINDOWS RULES ###
##############################
#windowrule = float on , Rofi



windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule = opacity 0.2 0.2, match:class konsole

windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

##############################
   ### WINDOWS RULES ###
##############################

windowrule {
    name = xwayland-video-bridge-fixes
    match:class = xwaylandvideobridge

    no_initial_focus = true
    no_focus = true
    no_anim = true
    no_blur = true
    max_size = 1 1
    opacity = 0.0
}
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule = opacity 0.2 0.2, match:class alacritty

windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}




#################
### MISC ###
#################
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
    disable_hyprland_logo = false
  disable_splash_rendering = false
    mouse_move_enables_dpms = true
  vfr = true
  vrr = 0
  animate_manual_resizes = true
  mouse_move_focuses_monitor = true
  enable_swallow = true
  swallow_regex = ^(kitty|Alacritty|konsole|wezterm)$

  vfr = true
  vrr = 2
  mouse_move_enables_dpms = true
  enable_swallow = off
  focus_on_activate = false
  initial_workspace_tracking = 0
  middle_click_paste = true
  enable_anr_dialog = true    # Application not Responding (ANR)
  anr_missed_pings = 15       # ANR Threshold default 1 is too low
  allow_session_lock_restore = true  # Prevent lockscreen crash when resume from suspend
  # This only works with HL v0.53+
  on_focus_under_fullscreen = 1
  # 0 - Default, no change
  # 1 - New focused window takes over fullscreen (Windows-like Alt-Tab)
  # 2 - New focused window stays behind the fullscreen one

}
binds {
  workspace_back_and_forth = true
  allow_workspace_cycles = true
  pass_mouse_when_bound = false
}
xwayland {
  enabled = true
  force_zero_scaling = true
}

render {
  direct_scanout = 0
}

cursor {
  sync_gsettings_theme = true
  no_hardware_cursors = 2 # change to 1 if want to disable
  enable_hyprcursor = true
  warp_on_change_workspace = 2
  no_warps = true
}


#############
### INPUT ###
#############

input {

    kb_layout = us
  kb_variant =
  kb_model =
  kb_options =
  kb_rules =
  repeat_rate = 25

  repeat_delay = 200
  sensitivity = 0 #mouse sensitivity
  numlock_by_default = true
  left_handed = false
  follow_mouse = 1
  float_switch_override_focus = false
    follow_mouse = 1

    sensitivity = 0.8 # -1.0 - 1.0, 0 means no modification.

    touchpad {
    disable_while_typing = true
    natural_scroll = true
    clickfinger_behavior = false
    middle_button_emulation = false
    tap-to-click = true
    drag_lock = false
  }
  	touchdevice {
		enabled = true
	}

	tablet {
		transform = 0
		left_handed = 0
	}
}

gestures {
  gesture = 3, horizontal, workspace
  workspace_swipe_distance = 500
  workspace_swipe_invert = true
  workspace_swipe_min_speed_to_force = 30
  workspace_swipe_cancel_ratio = 0.5
  workspace_swipe_create_new = true
  workspace_swipe_forever = true
  #workspace_swipe_use_r = true #uncomment if wanted a forever create a new workspace with swipe right
  gesture = 4, up, dispatcher, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor * 1.5}')"
  gesture = 4, down, dispatcher, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor / 1.5}')"
  gesture = 3, up, dispatcher, exec, $scriptsDir/OverviewToggle.sh
}


device {
    name = epic-mouse-v1
    sensitivity = -0.5
}
