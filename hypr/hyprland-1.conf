###################
### BASIC SETUP ###
###################

source = ~/.config/hypr/wallust/wallust-hyprland.conf

$terminal = foot
$fileManager = thunar
$browser = google-chrome-beta
# env = EDITOR, kate
# env = VISUAL, kate
# env = BROWSER, vivaldi
# env = PAGER, most

################
### MONITORS ###
################

#availableModes: 2560x1440@60.05Hz 2560x1440@48.04Hz
#monitor = eDP-1, 2560x1440@60.05, 0x0, 1.60
monitor = eDP-1, 2560x1440@60.05, 0x0, 1.60, bitdepth, 10

render {
    # Helps with color accuracy on Intel chips
   # direct_scanout = 1
    # Boosts the contrast and color "punch" at the hardware level
    ctm_animation = 1
}

##################
### WORKSPACES ###
##################

workspace = 1, monitor:eDP-1, persistent:true
workspace = 2, monitor:eDP-1, persistent:true
workspace = 3, monitor:eDP-1, persistent:true
workspace = 4, monitor:eDP-1, persistent:true


#################
### AUTOSTART ###
#################

# Wallpaper Engine (Wrapped in sh -c to safely run the loop)
# exec-once = swww-daemon --format argb  &
# exec-once = while true; do swww img $(find ~/Pictures/wallpapers -type f | shuf -n 1) --transition-type random --transition-step 30; sleep 600; done &

#
exec-once  = ~/.config/hypr/scripts/autostart.sh

# Scripts
#exec-once = sudo ~/.config/hypr/scripts/fan-init.sh &
#exec-once = ~/.config/hypr/scripts/ssh.sh &
#exec-once = ~/.config/hypr/scripts/playerctl-noti.sh &
#exec-once = ~/.config/hypr/scripts/hyprlock-playerctl.sh &
#exec-once = ~/.config/hypr/scripts/theme.sh &


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = GTK_THEME,Tokyonight-Dark
env = GDK_SCALE,1
#env = GTK_THEME,adw-gtk3-dark
env = GDK_BACKEND,wayland,x11,*
env = CLUTTER_BACKEND,wayland
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = XCURSOR_SIZE,20
env = HYPRCURSOR_THEME,MyCursor
env = HYPRCURSOR_SIZE,20

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

ecosystem:enforce_permissions = false

permission = /usr/bin/hyprlock, screencopy, allow
permission = /usr/bin/hypridle, screencopy, allow
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 1
    gaps_out = 0
    border_size = 2

    col.active_border = $color1 $color3 $color5 $color7 $color8 $color10 $color12 $color14 $color2 45deg
    col.inactive_border = $background

    resize_on_border = true
    allow_tearing = true
    layout = master
}

dwindle {
    force_split = 2            # always right/bottom
    preserve_split = true      # never flip splits
    smart_split = false        # disable cursor logic
    use_active_for_splits = true
    default_split_ratio = 1.0  # 50/50
    split_bias = 1             # focused window keeps size
    split_width_multiplier = 1.2
    smart_resizing = false     # no cursor resizing
    precise_mouse_move = false
}

master {
    orientation = left        # master always on the left
    mfact = 0.52              # master width
    new_status = slave        # new windows go to stack
    new_on_top = false        # append, not prepend
    new_on_active = none      # ignore focused window
    allow_small_split = false
    smart_resizing = false    # no cursor-based resize
    drop_at_cursor = false    # no cursor placement
    always_keep_position = false
}

animations {
    enabled = yes, please :)

    # NAME, X0, Y0, X1, Y1
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear, 0, 0, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1
    bezier = quick, 0.15, 0, 0.1, 1
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    # NAME, ONOFF, SPEED, CURVE, [STYLE]
    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 7, myBezier
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
    animation = zoomFactor, 1, 7, quick
}

decoration {
    rounding = 3
    rounding_power = 5
    active_opacity = 1.0
    inactive_opacity = 1.0

    blur {
        enabled = false
        size = 3
        passes = 1
        vibrancy = 0.1696
        new_optimizations = false
        xray = false
        ignore_opacity = false
    }

    shadow {
        enabled = false
        ignore_window = true
        offset = 1 2
        range = 10
        render_power = 4
        color = rgba(1a1a1aee)
    }
}

##############################
### LAYER & WINDOW RULES ###
##############################

# Layer Rules (Now using match:namespace)
#layerrule = blur on, match:namespace waybar
#layerrule = ignore_alpha 0.2, match:namespace swaync-notification-window

# Anonymous Rules (One-liners)
# windowrule = RULE [VALUE], match:FIELD VALUE

windowrule {
  name = vpn-menu-overlay
  match:class = org.kde.konsole
  match:initial_class = org.kde.konsole
  float = on
  size = 600 350
  move = (monitor_w * 0.5 - 300) 10

  center = off
  idle_inhibit = always
  rounding = 10
  dim_around = on
  border_size = 2
  xray = on

}

windowrule = suppress_event maximize, match:class .*
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1

# Hyprland Run
windowrule = float 1, match:class ^(hyprland-run)$
windowrule = move (monitor_w-120) 20, match:class ^(hyprland-run)$

# Hypremoji
windowrule = float 1, match:class ^(dev\.musagy\.hypremoji)$
windowrule = center 1, match:class ^(dev\.musagy\.hypremoji)$
windowrule = border_size 1, match:class ^(dev\.musagy\.hypremoji)$

# XWayland Video Bridge Fixes (Example of a Named Rule Block)
windowrule {
    name = xwayland-bridge-fix
    match:class = ^(xwaylandvideobridge)$
    no_initial_focus = on
    no_focus = on
    no_anim = on
    no_blur = on
    opacity = 0.0 override 0.0 override
    workspace = special:magic
}



############
### MISC ###
############

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = false
    vrr = 2
    mouse_move_enables_dpms = true
    enable_swallow = true
    swallow_regex = ^(kitty|Alacritty|konsole|wezterm)$
    focus_on_activate = false
    initial_workspace_tracking = 0
    middle_click_paste = true
    enable_anr_dialog = true
    anr_missed_pings = 15
    allow_session_lock_restore = true
    on_focus_under_fullscreen = 1
}

xwayland {
    enabled = true
    force_zero_scaling = true
}

cursor {
    sync_gsettings_theme = true
    no_hardware_cursors = 2
    enable_hyprcursor = true
    warp_on_change_workspace = 2
    no_warps = true
}


#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    repeat_rate = 25
    repeat_delay = 200
    sensitivity = 0.8
    numlock_by_default = true
    left_handed = false
    follow_mouse = 1
    float_switch_override_focus = false

    touchpad {
        disable_while_typing = true
        natural_scroll = true
        clickfinger_behavior = false
        middle_button_emulation = false
        tap-to-click = true
        drag_lock = false
    }
    touchdevice {
        enabled = true
    }
    tablet {
        transform = 0
        left_handed = 0
    }
}

binds {
    workspace_back_and_forth = true
    allow_workspace_cycles = true
    pass_mouse_when_bound = false
}

gestures {
    workspace_swipe_distance = 500
    workspace_swipe_invert = true
    workspace_swipe_min_speed_to_force = 30
    workspace_swipe_cancel_ratio = 0.5
    workspace_swipe_create_new = true
    workspace_swipe_forever = true

    # Plugin specific gesture rules
    gesture = 3, horizontal, workspace
    gesture = 4, up, dispatcher, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor * 1.5}')"
    gesture = 4, down, dispatcher, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor / 1.5}')"
    gesture = 3, up, dispatcher, exec, $scriptsDir/OverviewToggle.sh
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER
$userMod = CTRL
$singleKeyEnablerMod =
bind = $mainMod, U, exec, ~/.config/hypr/scripts/sudo.sh
bind = $mainMod, B, exec, $browser
bind = $mainMod, P, exec, ~/.config/hypr/scripts/phone
bind = $singleKeyEnablerMod, PRINT, exec, hyprshot -m region
bind = $mainMod, PRINT, exec, hyprshot -m window -o ~/Pictures/screenshots
bind = $mainMod SHIFT, PRINT, exec, hyprshot -m output -o ~/Pictures/screenshots
bind = $mainMod, L, exec, hyprlock
bindr = $mainMod, period, exec, hypremoji
bind = $mainMod, K, exec, kate
bind = $mainMod, F, exec, hyprctl dispatch fullscreen
bind = $mainMod, R, exec, ~/.config/hypr/scripts/force-reload.sh

bindr = $mainMod, SPACE, exec, sh -c "fuzzel; pkill fuzzel"
bindr = $mainMod SHIFT, 6, exec, sh -c "$terminal -e sudo nano /etc/wireguard/wg0.conf; exit 1"
bindr = $mainMod SHIFT, 7, exec, sh -c "$terminal -e sudo nano /etc/wireguard/wg1.conf; exit 1"
bindr = $mainMod SHIFT, 8, exec, sh -c "$terminal -e sudo nano /etc/wireguard/wg2.conf; exit 1"

bind = $mainMod, 6, exec, sh -c 'IFACE=wg0 ~/.config/hypr/scripts/wireguard.sh'
bind = $mainMod, 7, exec, sh -c 'IFACE=wg1 ~/.config/hypr/scripts/wireguard.sh'
bind = $mainMod, 8, exec, sh -c 'IFACE=wg2 ~/.config/hypr/scripts/wireguard.sh'

# MAIN
bind = $mainMod, G, togglegroup
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, SHIFT, pseudo, # dwindle

# Laptop multimedia keys for volume and LCD brightness
bindr = , XF86PowerOff, exec, sh -c "pgrep -x wlogout >/dev/null && pkill wlogout || wlogout"
#bindr = , XF86PowerOff, exec, sh -c 'pidof wlogout && pkill wlogout || wlogout'
#bind = , XF86PowerOff, exec, sh -c 'pgrep -x wlogout >/dev/null && pkill wlogout || wlogout'
# --- Audio ---
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 1%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# bindl = $mainMod, XF86MonBrightnessUp, exec, systemctl --user enable --now hyprsunset.service
# bindl = $mainMod, XF86MonBrightnessDown, exec, systemctl --user disable --now hyprsunset.service

bindel = , XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 2%-

# Move/resize windows
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Lid
bindl = , switch:on:Lid Switch, exec, hyprlock
bindl = , switch:on:Lid Switch, exec, hyprctl dispatch dpms off eDP-1
bindl = , switch:off:Lid Switch, exec, hyprctl dispatch dpms on eDP-1

# Example special workspace (scratchpad)
bind = $mainMod, M, togglespecialworkspace, magic
bind = $mainMod, X, movetoworkspace, special:magic


# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
